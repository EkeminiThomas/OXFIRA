info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{testEmail}}",
        "password": "{{testPassword}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body.data && res.body.data.accessToken) {
          bru.setEnvVar("accessToken", res.body.data.accessToken);
          bru.setEnvVar("refreshToken", res.body.data.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
