info:
  name: Logout
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
