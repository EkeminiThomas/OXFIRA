info:
  name: Refresh Token
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body.data && res.body.data.accessToken) {
          bru.setEnvVar("accessToken", res.body.data.accessToken);
          bru.setEnvVar("refreshToken", res.body.data.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
