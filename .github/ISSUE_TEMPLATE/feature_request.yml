name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Target milestone
      options:
        - Milestone 1 (Auth)
        - Milestone 2 (Email + OAuth)
        - Future / Unscheduled
    validations:
      required: true